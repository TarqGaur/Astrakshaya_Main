<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrakshaya — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #fff;
      text-decoration: none;
    }

    main {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    #rocket-canvas {
      width: 100px;
      height: 100px;
      display: block;
      margin-bottom: 48px;
    }

    h1 {
      font-size: clamp(22px, 3.5vw, 36px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.45;
      color: #fff;
      margin-bottom: 32px;
      max-width: 400px;
    }

    h1 strong {
      font-weight: 500;
    }

    .countdown {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      margin-bottom: 0;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .num {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .lbl {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .sep {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 200;
      color: rgba(255,255,255,0.2);
      padding-top: 4px;
    }

    @media (max-width: 480px) {
      .countdown { gap: 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Astrakshaya</a>
</nav>

<main>

  <canvas id="rocket-canvas"></canvas>

  <h1>Work in progress.<br><strong>Research publishing opens April 1.</strong></h1>

  <div class="countdown">
    <div class="unit"><div class="num" id="cd-days">00</div><div class="lbl">Days</div></div>
    <div class="sep">·</div>
    <div class="unit"><div class="num" id="cd-hours">00</div><div class="lbl">Hours</div></div>
    <div class="sep">·</div>
    <div class="unit"><div class="num" id="cd-mins">00</div><div class="lbl">Min</div></div>
    <div class="sep">·</div>
    <div class="unit"><div class="num" id="cd-secs">00</div><div class="lbl">Sec</div></div>
  </div>

</main>

<script>
(function () {
  const c = document.getElementById('rocket-canvas');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = 100 * dpr;
  c.height = 100 * dpr;
  c.style.width = '100px';
  c.style.height = '100px';
  ctx.scale(dpr, dpr);

  function draw(ts) {
    const t = ts / 1000;
    ctx.clearRect(0, 0, 100, 100);

    ctx.save();
    ctx.translate(50, 54 + Math.sin(t * 1.6) * 2.5);

    // exhaust
    const fl = 14 + Math.sin(t * 9) * 4;
    const fg = ctx.createLinearGradient(0, 24, 0, 24 + fl);
    fg.addColorStop(0, 'rgba(255,255,255,0.5)');
    fg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.ellipse(0, 24 + fl / 2, 3.5 + Math.sin(t * 7) * 0.6, fl / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = fg;
    ctx.fill();

    // body
    ctx.beginPath();
    ctx.roundRect(-8, -24, 16, 48, [8, 8, 3, 3]);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // nose
    ctx.beginPath();
    ctx.moveTo(-8, -24);
    ctx.quadraticCurveTo(-8, -44, 0, -50);
    ctx.quadraticCurveTo(8, -44, 8, -24);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();

    // window
    ctx.beginPath();
    ctx.arc(0, -10, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();

    // fins
    [1, -1].forEach(s => {
      ctx.save();
      ctx.scale(s, 1);
      ctx.beginPath();
      ctx.moveTo(8, 4);
      ctx.lineTo(16, 18);
      ctx.lineTo(8, 16);
      ctx.closePath();
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.restore();
    });

    ctx.restore();
    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();

(function () {
  const target = new Date('2026-04-01T00:00:00').getTime();
  const pad = n => String(n).padStart(2, '0');

  function tick() {
    const d = Math.max(0, target - Date.now());
    document.getElementById('cd-days').textContent  = pad(Math.floor(d / 86400000));
    document.getElementById('cd-hours').textContent = pad(Math.floor((d % 86400000) / 3600000));
    document.getElementById('cd-mins').textContent  = pad(Math.floor((d % 3600000) / 60000));
    document.getElementById('cd-secs').textContent  = pad(Math.floor((d % 60000) / 1000));
  }

  tick();
  setInterval(tick, 1000);
})();
</script>

</body>
</html>
